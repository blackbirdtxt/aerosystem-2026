<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroSystem Pro - Buscar Vuelos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .avion { background: linear-gradient(45deg, #3b82f6, #8b5cf6); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-pink-800 min-h-screen">
    
    <!-- Header -->
    <header class="glass sticky top-0 z-50 backdrop-blur-lg border-b border-white/20">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="panel-aeropuerto.html" class="flex items-center space-x-3 group">
                    <i class="fas fa-plane-departure text-3xl text-blue-400 group-hover:scale-110 transition-all"></i>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">
                        AeroSystem Pro
                    </h1>
                </a>
                <div class="flex space-x-4">
                    <a href="panel-aeropuerto.html" class="text-white hover:text-blue-300 transition">Panel Admin</a>
                    <button onclick="mostrarLogin()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-semibold transition-all">
                        Mi Cuenta
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Buscador Principal -->
    <div class="container mx-auto px-6 py-12">
        <div class="glass max-w-4xl mx-auto p-8 rounded-3xl glow mb-12">
            <h2 class="text-4xl font-bold text-center text-white mb-8 flex items-center justify-center">
                <i class="fas fa-search mr-4 text-blue-400"></i>
                Buscar Vuelos
            </h2>
            
            <form id="formBuscar" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-white/90 mb-2 font-semibold">🛫 Origen</label>
                    <select id="origen" class="w-full p-4 rounded-2xl bg-white/20 border border-white/30 text-black placeholder-blue-200 focus:outline-none focus:ring-4 focus:ring-blue-500/50" required>
                        <option value="">Selecciona aeropuerto...</option>
                        <option value="LIM00001">LIM - Jorge Chávez (Lima)</option>
                        <option value="BOG00001">BOG - El Dorado (Bogotá)</option>
                        <option value="SCL00001">SCL - Arturo Merino (Santiago)</option>
                        <option value="EZE00001">EZE - Ezeiza (Buenos Aires)</option>
                        <option value="MEX00001">MEX - Benito Juárez (CDMX)</option>
                        <option value="CUZ00001">CUZ - Velasco Astete (Cusco)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-white/90 mb-2 font-semibold">🛬 Destino</label>
                    <select id="destino" class="w-full p-4 rounded-2xl bg-white/20 border border-white/30 text-black placeholder-blue-200 focus:outline-none focus:ring-4 focus:ring-blue-500/50" required>
                        <option value="">Selecciona aeropuerto...</option>
                        <option value="LIM00001">LIM - Jorge Chávez (Lima)</option>
                        <option value="BOG00001">BOG - El Dorado (Bogotá)</option>
                        <option value="SCL00001">SCL - Arturo Merino (Santiago)</option>
                        <option value="EZE00001">EZE - Ezeiza (Buenos Aires)</option>
                        <option value="MEX00001">MEX - Benito Juárez (CDMX)</option>
                        <option value="CUZ00001">CUZ - Velasco Astete (Cusco)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-white/90 mb-2 font-semibold">📅 Fecha</label>
                    <input type="date" id="fecha" class="w-full p-4 rounded-2xl bg-white/20 border border-white/30 text-black focus:outline-none focus:ring-4 focus:ring-blue-500/50" value="<?= date('Y-m-d', strtotime('+1 day')) ?>" required>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full avion text-white font-bold py-4 px-6 rounded-2xl text-lg shadow-2xl hover:scale-105 transition-all glow">
                        <i class="fas fa-search mr-2"></i>Buscar Vuelos
                    </button>
                </div>
            </form>
        </div>

        <!-- Resultados -->
        <div id="resultados" class="hidden">
            <div class="glass p-8 rounded-3xl glow mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="tituloResultados" class="text-2xl font-bold text-white"></h3>
                    <div class="text-blue-300 text-sm" id="tiempoBusqueda"></div>
                </div>
                <div id="listaVuelos" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="modalLogin" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl glow">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-white">👤 Iniciar Sesión</h3>
                <button onclick="cerrarLogin()" class="text-white hover:text-red-400 text-2xl">&times;</button>
            </div>
            <form id="formLogin">
                <div class="mb-6">
                    <label class="block text-white/90 mb-2">Email</label>
                    <input type="email" id="loginMail" class="w-full p-4 rounded-xl bg-white/20 border border-white/30 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="demo@aerosystem.com" required>
                </div>
                <div class="mb-8">
                    <label class="block text-white/90 mb-2">Contraseña</label>
                    <input type="password" id="loginClave" class="w-full p-4 rounded-xl bg-white/20 border border-white/30 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="test123" required>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-xl text-lg transition-all glow">
                    <i class="fas fa-sign-in-alt mr-2"></i>Ingresar
                </button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-blue-200 text-sm">Demo: <strong>demo@aerosystem.com</strong> / <strong>test123</strong></p>
            </div>
        </div>
    </div>

    <script>
        let usuarioLogueado = null;
        let vuelosEncontrados = [];

        // Buscador
        document.getElementById('formBuscar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const origen = document.getElementById('origen').value;
            const destino = document.getElementById('destino').value;
            const fecha = document.getElementById('fecha').value;

            if (origen === destino) {
                alert('El origen y destino no pueden ser iguales');
                return;
            }

            const inicio = performance.now();
            
            try {
                const response = await fetch(`api/vuelos.php?origen=${origen}&destino=${destino}&fecha=${fecha}`);
                vuelosEncontrados = await response.json();
                
                const fin = performance.now();
                document.getElementById('tiempoBusqueda').textContent = `En ${((fin-inicio)/1000).toFixed(2)}s`;
                document.getElementById('tituloResultados').innerHTML = `
                    🛫 ${vuelosEncontrados.length} vuelo${vuelosEncontrados.length !== 1 ? 's' : ''} encontrado${vuelosEncontrados.length !== 1 ? 's' : ''} 
                    <span class="text-blue-300">(${origen.slice(0,3)} → ${destino.slice(0,3)})</span>
                `;
                
                renderizarVuelos();
                document.getElementById('resultados').classList.remove('hidden');
                document.getElementById('resultados').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('Error al buscar vuelos');
            }
        });

        function renderizarVuelos() {
            const contenedor = document.getElementById('listaVuelos');
            contenedor.innerHTML = '';

            vuelosEncontrados.forEach(vuelo => {
                const precioTotal = parseFloat(vuelo.precio_total).toLocaleString('es-PE', {
                    style: 'currency',
                    currency: 'PEN'
                });

                contenedor.innerHTML += `
                    <div class="glass p-6 rounded-2xl hover:bg-white/20 transition-all glow border border-white/20 group">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h4 class="text-xl font-bold text-white mb-1">${vuelo.numero_vuelo}</h4>
                                <div class="flex items-center space-x-4 text-blue-200 text-sm">
                                    <span>${vuelo.aerolinea}</span>
                                    <span>${vuelo.aeronave}</span>
                                    <span>${vuelo.capacidad} pax</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-green-400">${precioTotal}</div>
                                <div class="text-xs text-blue-300">${vuelo.clase}</div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
                            <div>
                                <div class="text-2xl font-bold text-white">${vuelo.aeropuerto_origen.slice(0,3)}</div>
                                <div class="text-blue-300 text-sm">${vuelo.aeropuerto_origen}</div>
                            </div>
                            <div class="flex flex-col items-center">
                                <div class="w-16 h-px bg-gradient-to-r from-transparent via-white to-transparent"></div>
                                <i class="fas fa-plane text-blue-400 text-xl mt-2"></i>
                                <div class="w-16 h-px bg-gradient-to-r from-transparent via-white to-transparent"></div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-white">${vuelo.aeropuerto_destino.slice(0,3)}</div>
                                <div class="text-blue-300 text-sm">${vuelo.aeropuerto_destino}</div>
                            </div>
                            <div class="text-center">
                                <div class="text-lg font-mono text-white">${new Date(vuelo.fecha_salida).toLocaleTimeString('es-PE', {hour: '2-digit', minute: '2-digit'})}</div>
                                <div class="text-xs text-blue-300">${vuelo.duracion_min} min</div>
                            </div>
                        </div>
                        
                        <div class="flex space-x-3">
                            ${usuarioLogueado ? 
                                `<button onclick="reservarVuelo(${vuelo.idvuelo}, ${vuelo.idtarifa})" 
                                        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition-all glow">
                                    <i class="fas fa-ticket-alt mr-2"></i>Reservar Ahora
                                </button>` :
                                `<button onclick="mostrarLogin()" 
                                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all glow">
                                    <i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesión
                                </button>`
                            }
                        </div>
                    </div>
                `;
            });
        }

        // Login
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mail = document.getElementById('loginMail').value;
            const clave = document.getElementById('loginClave').value;

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mail, clave })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    usuarioLogueado = result.user;
                    cerrarLogin();
                    alert(`¡Bienvenido ${result.user.nombre}!`);
                } else {
                    alert('Error de login');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });

        function mostrarLogin() {
            document.getElementById('modalLogin').classList.remove('hidden');
        }

        function cerrarLogin() {
            document.getElementById('modalLogin').classList.add('hidden');
        }

        // Reservar
        async function reservarVuelo(idvuelo, idtarifa) {
            if (!usuarioLogueado) {
                mostrarLogin();
                return;
            }

            const observacion = prompt('Observaciones (opcional):');
            
            try {
                const response = await fetch('api/reservas.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idvuelo, idtarifa, observacion })
                });
                
                const result = await response.json();
                
                if (result.idreserva > 0) {
                    alert(`✅ ¡Reserva #${result.idreserva} creada exitosamente!`);
                    document.getElementById('formBuscar').reset();
                    document.getElementById('resultados').classList.add('hidden');
                } else {
                    alert(`❌ Error: ${result.mensaje}`);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }
    </script>
</body>
</html>
