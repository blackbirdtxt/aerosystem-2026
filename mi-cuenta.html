<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroSystem Pro - Mi Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 min-h-screen">
    
    <!-- Header -->
    <header class="glass sticky top-0 z-50 backdrop-blur-lg border-b border-white/20">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center space-x-3">
                    <i class="fas fa-plane-departure text-3xl text-blue-400"></i>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">AeroSystem Pro</h1>
                </a>
                <div class="flex space-x-4">
                    <a href="index.html" class="text-white hover:text-blue-300">Buscar Vuelos</a>
                    <a href="panel-aeropuerto.html" class="text-white hover:text-blue-300">Panel Admin</a>
                    <button onclick="cerrarSesion()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-xl font-semibold">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-6 py-12">
        <div class="glass p-8 rounded-3xl glow mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">👤 Mi Cuenta</h2>
            <p id="infoUsuario" class="text-blue-200"></p>
        </div>

        <!-- Tabs -->
        <div class="glass rounded-3xl overflow-hidden mb-8">
            <div class="flex bg-white/10">
                <button onclick="mostrarTab('itinerario')" class="flex-1 py-4 px-6 text-center font-bold text-white border-b-4 border-transparent hover:border-blue-400 transition-all">📋 Itinerario</button>
                <button onclick="mostrarTab('checkin')" class="flex-1 py-4 px-6 text-center font-bold text-white border-b-4 border-transparent hover:border-green-400 transition-all">✈️ Check-in</button>
                <button onclick="mostrarTab('equipaje')" class="flex-1 py-4 px-6 text-center font-bold text-white border-b-4 border-transparent hover:border-orange-400 transition-all">🧳 Equipaje</button>
            </div>
            
            <!-- Itinerario -->
            <div id="tabItinerario" class="p-8">
                <div id="listaItinerario" class="space-y-4"></div>
            </div>
            
            <!-- Check-in -->
            <div id="tabCheckin" class="p-8 hidden">
                <div id="listaCheckin" class="space-y-4"></div>
            </div>
            
            <!-- Equipaje -->
            <div id="tabEquipaje" class="p-8 hidden">
                <div class="mb-8">
                    <div class="flex gap-4 mb-4">
                        <input type="text" id="codigoTracking" placeholder="Código de etiqueta (ej: LIM-2026-000001)" class="flex-1 p-4 rounded-2xl bg-white/20 border border-white/30 text-white focus:outline-none">
                        <button onclick="buscarEquipaje()" class="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-2xl font-bold glow">🔍 Buscar</button>
                    </div>
                    <div id="resultadoTracking" class="glass p-6 rounded-2xl mt-4 hidden"></div>
                </div>
                <div id="miEquipaje" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let usuario = null;
        let itinerario = [];
        let equipaje = [];

        // Verificar sesión
        async function verificarSesion() {
            // Simular verificación (en producción usar API)
            usuario = { idpasajero: 'PAS00001', nombre: 'Juan', apaterno: 'García' };
            document.getElementById('infoUsuario').textContent = `Hola, ${usuario.nombre} ${usuario.apaterno}`;
            cargarDatos();
        }

        async function cargarDatos() {
            try {
                // Itinerario
                const resItinerario = await fetch('api/pagos.php');
                itinerario = await resItinerario.json();
                renderizarItinerario();

                // Equipaje
                const resEquipaje = await fetch('api/equipaje.php');
                equipaje = await resEquipaje.json();
                renderizarEquipaje();
            } catch (error) {
                console.error('Error cargando datos');
            }
        }

        function renderizarItinerario() {
            const contenedor = document.getElementById('listaItinerario');
            contenedor.innerHTML = itinerario.length ? 
                itinerario.map(reserva => `
                    <div class="glass p-6 rounded-2xl border border-white/20">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-xl font-bold text-white">${reserva.numero_vuelo}</h4>
                                <div class="text-blue-300">${reserva.origen} → ${reserva.destino}</div>
                            </div>
                            <div class="text-right">
                                <span class="bg-green-500 text-white px-3 py-1 rounded-full text-sm font-bold">${reserva.estado_reserva}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center mb-6">
                            <div><div class="text-lg font-bold text-white">${new Date(reserva.fecha_salida).toLocaleDateString()}</div></div>
                            <div><div class="text-lg font-mono text-white">${new Date(reserva.fecha_salida).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div></div>
                            <div><span class="text-2xl text-green-400 font-bold">S/ ${parseFloat(reserva.costo).toFixed(2)}</span></div>
                            ${reserva.estado_reserva === 'Confirmada' ? 
                                `<div><button onclick="hacerCheckin(${reserva.idreserva})" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-bold">Check-in</button></div>` : 
                                ''
                            }
                        </div>
                    </div>
                `).join('') : 
                '<div class="text-center py-12 text-blue-200"><i class="fas fa-ticket-alt text-6xl mb-4 opacity-50"></i><p>No tienes reservas</p></div>';
        }

        async function hacerCheckin(idreserva) {
            if (!confirm('¿Realizar check-in?')) return;
            
            try {
                const response = await fetch('api/checkin.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idreserva })
                });
                
                const result = await response.json();
                if (result.idcheckin > 0) {
                    alert(`✅ Check-in completado!\nAsiento: ${result.asiento}\nPuerta: ${result.puerta_embarque}`);
                    cargarDatos();
                } else {
                    alert(`❌ ${result.mensaje}`);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }

        function renderizarEquipaje() {
            const contenedor = document.getElementById('miEquipaje');
            contenedor.innerHTML = equipaje.length ? 
                equipaje.map(item => `
                    <div class="glass p-6 rounded-2xl flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-white">${item.numero_vuelo}</h4>
                            <div class="text-blue-300">${item.tipo_equipaje} - ${item.peso_real}kg</div>
                            <div class="text-sm text-gray-300">Código: ${item.etiqueta_codigo}</div>
                        </div>
                        <span class="px-4 py-2 rounded-full text-sm font-bold ${
                            item.estado === 'En bodega' ? 'bg-green-500' :
                            item.estado === 'Registrado' ? 'bg-blue-500' :
                            item.estado === 'Entregado' ? 'bg-gray-500' : 'bg-yellow-500'
                        } text-white">${item.estado}</span>
                    </div>
                `).join('') : 
                '<div class="text-center py-12 text-blue-200"><i class="fas fa-suitcase text-6xl mb-4 opacity-50"></i><p>No tienes equipaje registrado</p></div>';
        }

        async function buscarEquipaje() {
            const codigo = document.getElementById('codigoTracking').value;
            if (!codigo) return alert('Ingresa un código');

            try {
                const response = await fetch(`api/equipaje.php?codigo=${encodeURIComponent(codigo)}`);
                const equipaje = await response.json();
                
                const contenedor = document.getElementById('resultadoTracking');
                if (equipaje.mensaje) {
                    contenedor.innerHTML = `<div class="text-red-400 p-6 text-center">Equipaje no encontrado</div>`;
                } else {
                    contenedor.innerHTML = `
                        <div class="p-6 bg-green-500/20 border border-green-500/50 rounded-2xl">
                            <h4 class="font-bold text-xl text-white mb-2">${equipaje.numero_vuelo}</h4>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div><strong>Estado:</strong> <span class="font-bold text-green-300">${equipaje.estado}</span></div>
                                <div><strong>Código:</strong> ${equipaje.etiqueta_codigo}</div>
                                <div><strong>Pasajero:</strong> ${equipaje.pasajero}</div>
                                <div><strong>Origen:</strong> ${equipaje.origen.slice(0,3)}</div>
                            </div>
                        </div>
                    `;
                }
                contenedor.classList.remove('hidden');
            } catch (error) {
                alert('Error');
            }
        }

        function mostrarTab(tab) {
            document.querySelectorAll('[id^="tab"]').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
            
            document.querySelectorAll('[onclick^="mostrarTab"]').forEach(btn => {
                btn.classList.remove('border-blue-400', 'border-green-400', 'border-orange-400');
                btn.classList.add('border-transparent');
            });
            event.target.classList.remove('border-transparent');
            event.target.classList.add(`border-${tab === 'itinerario' ? 'blue' : tab === 'checkin' ? 'green' : 'orange'}-400`);
        }

        function cerrarSesion() {
            if (confirm('¿Cerrar sesión?')) {
                window.location.href = 'index.html';
            }
        }

        // Inicializar
        verificarSesion();
    </script>
</body>
</html>
